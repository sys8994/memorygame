<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메모리게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <button id="btn-album" class="btn-icon album-btn" aria-label="Photo album" title="Photo album">Album</button>
        <button id="btn-lang-toggle" class="btn-icon lang-btn" aria-label="Switch language">🌐 EN</button>
        <button id="btn-audio-toggle" class="btn-icon audio-btn" hidden aria-hidden="true">🔊</button>

        <div id="screen-home" class="screen active">
            <header>
                <h1 id="home-title">메모리게임</h1>
                <span id="home-credit" class="home-credit">by.지범아빠</span>
                <p id="home-subtitle">어떤 그림으로 놀아볼까요?</p>
            </header>

            <main>
                <div id="theme-grid" class="theme-grid"></div>
                <input type="file" id="custom-image-upload" multiple accept="image/*" style="display:none;">
            </main>
        </div>

        <div id="screen-game" class="screen">
            <header class="game-header">
                <button id="btn-back" class="btn-icon game-nav-btn" aria-label="Home" title="Home">🏠</button>
                <div class="game-header-center">
                    <div id="turn-counter" class="turn-counter">Turn 1</div>
                    <div id="player-stats" class="player-stats"></div>
                </div>
                <button id="btn-restart" class="btn-icon game-nav-btn" aria-label="Restart" title="Restart">🔄</button>
            </header>

            <main class="game-main">
                <div id="game-board" class="game-board"></div>
            </main>

            <div id="countdown-overlay" class="countdown-overlay hidden">
                <span id="countdown-text">3</span>
            </div>
        </div>

        <div id="modal-clear" class="modal hidden">
            <div class="modal-content">
                <div class="confetti-container"></div>
                <h2 id="clear-title">다 찾았어요!</h2>
                <div class="mascot">🎉</div>
                <p id="clear-message">모든 카드의 짝을 다 찾았어요!</p>
                <p class="final-score" id="final-result-text">결과를 계산 중...</p>
                <p class="clear-turns-text" id="clear-turns-text"></p>
                <div class="modal-buttons">
                    <button id="btn-modal-restart" class="btn-primary">다시하기</button>
                    <button id="btn-modal-home" class="btn-secondary">다른 게임 하기</button>
                </div>
            </div>
        </div>

        <div id="modal-album" class="modal hidden">
            <div class="modal-content album-modal-content">
                <div class="album-modal-header">
                    <h2 id="album-title">Photo Album</h2>
                    <button id="btn-album-close" class="btn-icon modal-close-btn" aria-label="Close" title="Close">X</button>
                </div>
                <p id="album-subtitle" class="difficulty-modal-text">Add or remove photos for My Photos mode.</p>
                <div class="album-toolbar">
                    <button id="btn-album-add" class="btn-primary album-add-btn">Add Photos</button>
                    <p id="album-count" class="album-count">0 photos</p>
                </div>
                <p id="album-empty" class="album-empty hidden">No photos yet.</p>
                <div id="album-grid" class="album-grid"></div>
            </div>
        </div>

        <div id="modal-difficulty" class="modal hidden">
            <div class="modal-content difficulty-modal-content">
                <h2 id="setup-title">게임 설정</h2>
                <p id="setup-subtitle" class="difficulty-modal-text">카드 개수와 플레이어 수를 골라요</p>

                <div class="setup-group">
                    <h3 id="setup-cards-label">카드 개수</h3>
                    <div id="difficulty-buttons-modal" class="difficulty-buttons difficulty-buttons-modal">
                        <button class="btn-diff" data-pairs="6">12장</button>
                        <button class="btn-diff active" data-pairs="8">16장</button>
                        <button class="btn-diff" data-pairs="10">20장</button>
                        <button class="btn-diff" data-pairs="12">24장</button>
                    </div>
                </div>

                <div class="setup-group">
                    <h3 id="setup-players-label">플레이어 수</h3>
                    <div id="player-count-buttons" class="difficulty-buttons player-count-buttons">
                        <button class="btn-player-count" data-players="1">1명</button>
                        <button class="btn-player-count active" data-players="2">2명</button>
                        <button class="btn-player-count" data-players="3">3명</button>
                        <button class="btn-player-count" data-players="4">4명</button>
                    </div>
                </div>

                <button id="btn-setup-start" class="btn-primary setup-start-btn">시작하기</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
